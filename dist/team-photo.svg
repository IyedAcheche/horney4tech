<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C75B1E;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A64B15;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="350" r="120" fill="#C75B1E" opacity="0.2"/>
  <circle cx="700" cy="50" r="100" fill="#A64B15" opacity="0.15"/>
  
  <!-- Four person silhouettes representing the team -->
  <!-- Person 1 -->
  <circle cx="200" cy="180" r="45" fill="#FDF5E8"/>
  <ellipse cx="200" cy="320" rx="55" ry="80" fill="#FDF5E8"/>
  
  <!-- Person 2 -->
  <circle cx="320" cy="160" r="50" fill="#FDF5E8"/>
  <ellipse cx="320" cy="310" rx="60" ry="90" fill="#FDF5E8"/>
  
  <!-- Person 3 -->
  <circle cx="480" cy="160" r="50" fill="#FDF5E8"/>
  <ellipse cx="480" cy="310" rx="60" ry="90" fill="#FDF5E8"/>
  
  <!-- Person 4 -->
  <circle cx="600" cy="180" r="45" fill="#FDF5E8"/>
  <ellipse cx="600" cy="320" rx="55" ry="80" fill="#FDF5E8"/>
  
  <!-- Microphone icons -->
  <g transform="translate(380, 380) scale(0.5)" fill="#C75B1E">
    <rect x="0" y="0" width="20" height="30" rx="10"/>
    <path d="M-5 25 Q-5 45 10 45 Q25 45 25 25" stroke="#C75B1E" stroke-width="4" fill="none"/>
    <line x1="10" y1="45" x2="10" y2="55" stroke="#C75B1E" stroke-width="4"/>
  </g>
  
  <!-- Text overlay -->
  <text x="400" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#C75B1E">THE HORNEY4TECH TEAM</text>
</svg>

